<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<title>SCI FARM PLAN DOCUMENT BUILDER</title>
<style>
:root{--soil:#2f2118;--leaf:#2f6b2f;--leaf2:#1f5a34;--clay:#a8551f;--soft:#f6f3ea;--line:#ddd6c7;--muted:#776d61;--white:#fff;--blue:#244a8f;--red:#b42318}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f1e8;color:var(--soil)}button,input,select,textarea{font:inherit}input,select,textarea{width:100%;min-height:40px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--soil);padding:7px 9px;outline:none;font-size:16px}textarea{min-height:54px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--clay);box-shadow:0 0 0 3px rgba(168,85,31,.12)}.app{max-width:1180px;margin:0 auto;background:#fbfaf5;min-height:100vh;border-left:1px solid var(--line);border-right:1px solid var(--line)}.home,.page{padding:14px}.hero,.card,.crop-card,.crop-page-shell{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.hero{padding:18px}.hero-badge{display:none!important}h1{font-size:28px;margin:10px 0 6px;color:var(--leaf2)}h2{font-size:20px;margin:0 0 4px;color:var(--leaf2)}h3{font-size:16px;margin:0 0 5px;color:var(--soil)}.sub,.help,.small{color:var(--muted);font-size:12px;line-height:1.35}.app-bar{height:46px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 10px;position:sticky;top:0;z-index:5}.app-bar-title{font-weight:900;color:var(--leaf2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.back-btn,.app-bar-action,.btn{border:0;border-radius:9px;padding:9px 12px;font-weight:850;cursor:pointer;background:var(--leaf2);color:#fff}.back-btn,.app-bar-action{font-size:13px;padding:7px 10px}.btn.secondary{background:var(--clay)}.btn.ghost{background:#fff;color:var(--leaf2);border:1px solid var(--line)}.btn.danger{background:#fff;color:var(--red);border:1px solid #f1b7b0}.btn:disabled{opacity:.45;cursor:not-allowed}.actions,.btn-row,.footer-nav{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.step-bar{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;padding:8px 10px;background:#fff;border-bottom:1px solid var(--line)}.step-item{display:flex;align-items:center;gap:5px;min-width:0;color:var(--muted);font-size:10px;font-weight:800}.step-dot{width:10px;height:10px;border-radius:50%;background:#ddd}.step-item.active .step-dot{background:var(--clay)}.step-item.done .step-dot{background:var(--leaf2)}.step-item.active{color:var(--clay)}.step-item.done{color:var(--leaf2)}.input-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.field label{display:block;font-size:11px;font-weight:850;color:var(--soil);margin-bottom:4px}.field.full{grid-column:1/-1}.field.half{grid-column:span 2}.feature-list,.summary-grid,.checkbox-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}.feature-item,.metric,.check-tile,.note,.qa-box{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px}.fi-icon{font-size:20px}.fi-head,.metric .label{font-size:11px;font-weight:900;color:var(--leaf2);text-transform:uppercase;letter-spacing:.03em}.fi-sub,.metric .small{font-size:11px;color:var(--muted)}.metric .value{font-size:22px;font-weight:950;color:var(--soil)}.check-tile{display:flex;gap:8px;align-items:flex-start;font-size:13px;font-weight:700}.crop-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 8px}.crop-tab{border:1px solid var(--line);background:#fff;color:var(--soil);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:850;white-space:nowrap;cursor:pointer}.crop-tab.active{background:var(--leaf2);border-color:var(--leaf2);color:#fff}.crop-head,.crop-meta{display:grid;grid-template-columns:minmax(160px,1.1fr) minmax(95px,.4fr) minmax(90px,.35fr) minmax(95px,.35fr) auto;gap:9px;align-items:end;padding:10px;margin:-12px -12px 9px;background:var(--soft);border-bottom:1px solid var(--line);border-radius:14px 14px 0 0}.crop-card{display:block}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:10px 0 8px}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:#fff}table{border-collapse:collapse;width:100%;min-width:850px}th,td{border-bottom:1px solid var(--line);padding:7px;text-align:left;vertical-align:top;font-size:12px}th{background:#edf7ec;color:var(--soil);font-size:11px;font-weight:900}.readonly,.readout{background:#f6f3ea;border:1px solid var(--line);border-radius:8px;min-height:34px;padding:8px;font-weight:850}.calc-output{color:var(--leaf2);font-weight:850}.entry-card,.event-card{border:1px solid var(--line);border-radius:12px;margin:8px 0;background:#fff;overflow:hidden}.entry-header,.event-header{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#f6f3ea;padding:8px 10px;font-weight:900}.entry-body,.event-body{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:10px}.span-3{grid-column:span 3}.skip{background:#fff7ed;border-color:#fdba74}.ok-note{background:#eef8ee;border-color:#b8dfb8}.hidden{display:none!important}.pill{display:inline-flex;border-radius:999px;padding:5px 8px;font-weight:900;font-size:12px;border:1px solid var(--line)}.level-IV,.level-III{background:#edf7ec;color:var(--leaf2)}.level-II,.level-I{background:#fff7ed;color:var(--clay)}.level-Gap{background:#fff1f0;color:var(--red)}.qaqc-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #eee}.qaqc-item:last-child{border-bottom:0}@media(max-width:900px){.input-grid,.feature-list,.summary-grid,.checkbox-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.step-bar{grid-template-columns:repeat(5,1fr)}.crop-head,.crop-meta{grid-template-columns:1fr 1fr}.entry-body,.event-body{grid-template-columns:1fr 1fr}.field.half,.span-3{grid-column:1/-1}}@media(max-width:560px){.input-grid,.feature-list,.summary-grid,.checkbox-grid,.crop-head,.crop-meta,.entry-body,.event-body{grid-template-columns:1fr}.step-item span{display:none}.page,.home{padding:9px}.hero,.card,.crop-card{padding:10px}.app-bar{height:auto;min-height:46px;flex-wrap:wrap}.actions .btn,.footer-nav .btn{width:100%}table{min-width:760px}}


/* Forced stacked log/card layout for tight tables and iframe/mobile views */
.table-wrap.responsive-stack{overflow:visible!important;border:0!important;background:transparent!important}
.table-wrap.responsive-stack table,
.table-wrap.responsive-stack thead,
.table-wrap.responsive-stack tbody,
.table-wrap.responsive-stack th,
.table-wrap.responsive-stack td,
.table-wrap.responsive-stack tr{display:block!important;width:100%!important;min-width:0!important;max-width:100%!important}
.table-wrap.responsive-stack table{min-width:0!important;border-collapse:separate!important;border-spacing:0!important}
.table-wrap.responsive-stack thead{display:none!important}
.table-wrap.responsive-stack tbody{display:grid!important;gap:10px!important}
.table-wrap.responsive-stack tr{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important;border:1px solid var(--line)!important;border-radius:14px!important;background:#fff!important;padding:10px!important;box-shadow:0 1px 0 rgba(47,33,24,.04)!important;margin-bottom:10px!important}
.table-wrap.responsive-stack td{border:0!important;padding:0!important;font-size:12px!important;min-width:0!important;background:transparent!important}
.table-wrap.responsive-stack td::before{content:attr(data-label);display:block!important;font-size:11px!important;font-weight:900!important;color:var(--soil)!important;margin-bottom:4px!important;line-height:1.2!important}
.table-wrap.responsive-stack td:not([data-label])::before{content:''!important;display:none!important}
.table-wrap.responsive-stack td input,
.table-wrap.responsive-stack td select,
.table-wrap.responsive-stack td textarea{min-height:42px!important;width:100%!important;max-width:100%!important}
.table-wrap.responsive-stack td.readonly{display:block!important;background:#f6f3ea!important;border:1px solid var(--line)!important;border-radius:9px!important;min-height:42px!important;padding:8px!important}
.table-wrap.responsive-stack td.readonly::before{display:block!important;background:transparent!important;border:0!important;padding:0!important;min-height:0!important}
.table-wrap.responsive-stack td:last-child{grid-column:1/-1!important}
.table-wrap.responsive-stack td:last-child .btn{width:100%!important}
@media(max-width:700px){.table-wrap.responsive-stack tr{grid-template-columns:1fr!important}}


.roll-card,.roll-crop-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.roll-section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:0 0 8px}.roll-section-title h2{font-size:20px;margin:0 0 4px;color:var(--leaf2)}.roll-section-title h3{font-size:16px;margin:0 0 5px;color:var(--soil)}.roll-help,.roll-small{color:var(--muted);font-size:12px;line-height:1.35}.roll-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.roll-btn{border:0;border-radius:9px;padding:9px 12px;font-weight:850;cursor:pointer;background:var(--leaf2);color:#fff}.roll-btn.secondary{background:var(--clay)}.roll-btn.ghost{background:#fff;color:var(--leaf2);border:1px solid var(--line)}.roll-table{border-collapse:collapse;width:100%;min-width:850px}.roll-table th,.roll-table td{border-bottom:1px solid var(--line);padding:7px;text-align:left;vertical-align:top;font-size:12px}.roll-table th{background:#edf7ec;color:var(--soil);font-size:11px;font-weight:900}.roll-table tr:last-child td{border-bottom:0}.data-summary{background:#f6f3ea;border:1px solid var(--line);border-radius:12px;padding:10px}.ds-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.ds-cell{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}.ds-cell-val{font-size:22px;font-weight:950;color:var(--soil);line-height:1.1}.ds-cell-lbl{font-size:11px;font-weight:900;color:var(--leaf2);text-transform:uppercase;letter-spacing:.03em;margin-top:3px}.compliance-pending{background:#fff7ed;color:var(--clay)}.compliant{background:#edf7ec;color:var(--leaf2)}.not-compliant{background:#fff1f0;color:var(--red)}@media(max-width:900px){.roll-section-title{align-items:flex-start;flex-direction:column}.ds-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.ds-grid{grid-template-columns:1fr}.roll-actions .roll-btn{width:100%}}
</style>
</head><body><div id="app" class="app"></div>
<script>
'use strict';
const MAX_CROPS=10;
const STEPS=['SCI FARM PLAN DOCUMENT BUILDER','Farm Details','Crop Planner','Harvest Log','Tillage','Nutrient Management Plan','IPM Plan','Diesel Log','Irrigation Log','Roll Up'];
const STATES=['','Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'];
const GOALS=['Improve soil health','Reduce tillage','Increase living roots','Increase soil cover','Increase crop diversity','Reduce synthetic inputs','Improve pest management','Improve water efficiency','Reduce fuel use','Improve yield resilience','Improve profitability','Access to markets','Prepare for SCI verification','Improve biodiversity'];
const CROP_TYPES=['','Alfalfa','Almonds','Apples','Barley','Beans - Dry Edible','Blueberries','Canola','Carrots','Citrus','Corn - Field Corn','Corn - Silage','Corn - Sweet Corn','Cotton','Cover Crop Mix','Grapes / Vineyard','Grass Hay','Hemp','Lettuce','Melons','Millet','Mixed Vegetables','Oats','Onions','Orchard / Tree Fruit','Peanuts','Peas','Potatoes','Rice','Rye','Sorghum','Soybeans','Sugar Beets','Sunflower','Tomatoes','Triticale','Wheat - Spring','Wheat - Winter','Other'];
const TERM=['','Herbicide','Frost Kill','Winter Kill','Roller Crimp','Tillage','Harvest','Grazing','Other'];
const TILLAGE_RATINGS=[{label:'Inversion some mixing',rating:1.0},{label:'Mixing + some inversion',rating:0.8},{label:'Lifting and fracturing',rating:0.4},{label:'Mixing only',rating:0.7},{label:'Compression',rating:0.15}];
const PRODUCT_UNITS=['lbs','Tons','Gallons','Fluid oz'];
const AMEND_TYPES=['Compost','Manure','Biochar','Compost Extract','Compost Tea','Humic Acid','Fulvic Acid','Microbial Inoculant'];
const IPM_UNITS=['lb/acre','fl oz/acre','oz/acre','gal/acre','pint/acre','quart/acre','dispensers/acre'];
const IPM_METHODS=['','Spray - foliar applied','Spray - soil applied','Spray - in furrow','Air Blast','Chemigation','Granular','Fumigation','Dust','Seed Treatment','Pheromone Dispenser','Bait','Post Harvest'];
const HARVEST_UNITS=['bu','tons','lbs','cwt','bales','each','kg','metric tons','other'];
const DIESEL_PRACTICES=[['groundWork','Ground Work'],['plantingCashCrop','Planting Cash Crop'],['plantingCoverCrop','Planting Cover Crop'],['fertilizerApplications','Fertilizer Applications'],['sprayApplications','Spray Applications'],['harvest','Harvest'],['transport','Transport'],['irrigationPumpOperations','Irrigation Pump Operations']];
const WATER_SOURCES=['','Well','Surface water','Canal / district water','Pond / reservoir','Municipal / reclaimed water','Other'];
const DRAINAGE_TYPES=['','Surface drainage','Subsurface tile','Controlled drainage','No drainage system','Unknown'];
const METHODS_NON_RICE=['','Rain Fed Only','Drip','Center Pivot','Linear Move','Sprinkler / Solid Set','Flood / Furrow','Other'];
const METHODS_RICE=['','Continuously Flooded','Alternate Wetting and Drying (AWD)','Furrow Irrigated Rice','Rain Fed Only','Other'];
const app=document.getElementById('app');
const state={step:0,activeCrop:0,dieselEnabled:false,irrigationEnabled:false,farm:{farmName:'',contactName:'',email:'',phone:'',farmAddress:'',mailingAddress:'',state:'',county:'',usdaZone:'',firstFrost:'',lastFrost:'',nrcs:'',yearsFarming:'',totalAcres:'',acresAdded:'',acresLost:'',acresLostAmount:'',acresLostWhy:'',soilLabTesting:'',soilFieldTesting:'',fieldBoundariesConfirmed:'',fieldBoundariesWhyNo:'',numberOfCrops:1,livestock:'',livestockWhyNo:'',goals:[],notes:''},crops:[newCrop(1)]};
function newCrop(i){return{name:'',cropType:'',cropTypeOther:'',acres:'',fields:'',year:new Date().getFullYear(),noTill:false,nonGmo:false,cropPlanner:[entry('Pre-Season Cover Crop (Optional)'),entry('Cash Crop (Required)'),entry('Post-Harvest Cover Crop (Optional)')],harvestRows:[{yieldAcre:'',unit:'bu',notes:''}],tillageRows:[{date:'',depthIn:'',implement:'',tillageType:'',disturbed:'100',passes:'1',notes:''}],fertilizerRows:[{productName:'',applicationDate:'',rateAcre:'',unit:'lbs',nPct:'',pPct:'',kPct:'',notes:''}],microRows:[],amendmentRows:[],ipmRows:[{applicationDate:'',pest:'',productName:'',epaRegNo:'',unit:'lb/acre',amountAcre:'',activePct:'',applicationMethod:'',areaApplied:'',notes:''}],dieselRows:[{}],irrigationRows:[{cropPractice:'Non-rice crop',method:'',drainageType:'',irrigatedAcres:'',pumpName:'',waterSource:'',pumpGpm:'',emitterGpm:'',emitterSpacing:'',rowSpacing:'',sprinklerGpm:'',sprinklerSpacing:'',lateralSpacing:'',minHours:'',maxHours:'',minCycles:'',maxCycles:'',awdEvents:'',notes:''}]}}
function entry(title){return{title,plantingYear:new Date().getFullYear(),crop:'',variety:'',seedingRate:'',plantingDate:'',harvestDate:'',terminationStyle:'',notes:''}}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function num(v){let n=parseFloat(v);return Number.isFinite(n)?n:0}function fmt(n,d=2){return num(n).toFixed(d)}function setStep(n){saveInputs();state.step=Math.max(0,Math.min(STEPS.length-1,n));render();window.scrollTo({top:0,behavior:'smooth'})}
function saveInputs(){document.querySelectorAll('[data-bind]').forEach(el=>setPath(el.dataset.bind,el.type==='checkbox'?el.checked:el.value))}
function getPath(p){return p.split('.').reduce((o,k)=>o&&o[k],state)}function setPath(p,v){let a=p.split('.'),o=state;while(a.length>1)o=o[a.shift()];o[a[0]]=v}
function options(arr,val){return arr.map(o=>`<option value="${esc(o)}" ${String(val??'')===String(o)?'selected':''}>${esc(o||'Select')}</option>`).join('')}
function field(label,path,type='text',extra={}){let val=getPath(path)??'';let cls=extra.cls||'';if(type==='select')return`<div class="field ${cls}"><label>${label}</label><select data-bind="${path}">${options(extra.options||[],val)}</select></div>`;if(type==='textarea')return`<div class="field ${cls}"><label>${label}</label><textarea data-bind="${path}" placeholder="${esc(extra.placeholder||'')}">${esc(val)}</textarea></div>`;return`<div class="field ${cls}"><label>${label}</label><input data-bind="${path}" type="${type}" value="${esc(val)}" placeholder="${esc(extra.placeholder||'')}" ${extra.min?`min="${extra.min}"`:''} ${extra.max?`max="${extra.max}"`:''} ${extra.step?`step="${extra.step}"`:''}></div>`}
function crop(){return state.crops[state.activeCrop]||state.crops[0]}
function cropTabs(){return`<div class="crop-tabs">${state.crops.map((c,i)=>`<button class="crop-tab ${i===state.activeCrop?'active':''}" onclick="saveInputs();state.activeCrop=${i};render()">${esc(c.name||'Crop '+(i+1))}</button>`).join('')}</div>`}
function stepBar(){return`<div class="app-bar"><button class="back-btn" onclick="setStep(Math.max(0,state.step-1))">←</button><span class="app-bar-title">${STEPS[state.step]}</span><button class="app-bar-action" onclick="setStep(Math.min(${STEPS.length-1},state.step+1))">Next →</button></div><div class="step-bar">${STEPS.map((s,i)=>`<div class="step-item ${i===state.step?'active':i<state.step?'done':''}"><div class="step-dot"></div><span>${esc(s)}</span></div>`).join('')}</div>`}
function nav(prev,next){return`<div class="footer-nav"><button class="btn ghost" onclick="setStep(${prev})">← Back</button><button class="btn" onclick="setStep(${next})">Continue →</button></div>`}
function home(){return`<main class="home"><div class="hero"><h1>SCI FARM PLAN DOCUMENT BUILDER</h1><p class="sub">Farm plans are the core requirement of the program, outlining the specific actions a producer will take on enrolled fields to meet program standards.</p><div class="feature-list"><div class="feature-item"><div class="fi-icon">🚜</div><div class="fi-head">Farm Details</div><div class="fi-sub">Enter contact, location, acres, testing status, and farm goals.</div></div><div class="feature-item"><div class="fi-icon">🌱</div><div class="fi-head">Crop Plans</div><div class="fi-sub">Build crop-by-crop plans for enrolled fields and acres.</div></div><div class="feature-item"><div class="fi-icon">🧩</div><div class="fi-head">Practice Sections</div><div class="fi-sub">Document tillage, nutrients, IPM, livestock, and irrigation actions.</div></div><div class="feature-item"><div class="fi-icon">📄</div><div class="fi-head">Review & Export</div><div class="fi-sub">Check missing items and download the farm plan report, CSV, or ZIP.</div></div></div><div class="actions" style="margin-top:12px"><button class="btn" onclick="setStep(1)">Get Started →</button></div></div></main>`}
function farmDetails(){return`${stepBar()}<main class="page"><div class="card"><h2>Farm Details</h2><div class="help">This single setup section creates the per-crop logic for all future sections.</div><div class="input-grid" style="margin-top:8px">
${field('Farm Name','farm.farmName')}
${field('Contact Name','farm.contactName')}
${field('Email','farm.email','email')}
${field('Phone Number','farm.phone','tel')}
${field('Farm Address','farm.farmAddress','textarea',{cls:'half',placeholder:'Physical farm address'})}
${field('Mailing Address','farm.mailingAddress','textarea',{cls:'half',placeholder:'Mailing address, if different'})}
${field('State','farm.state','select',{options:STATES})}
${field('County','farm.county')}
${field('USDA Growing Zone','farm.usdaZone','text',{placeholder:'Example: 6b'})}
${field('First Frost Date','farm.firstFrost','date')}
${field('Last Frost Date','farm.lastFrost','date')}
${field('NRCS Participation','farm.nrcs','select',{options:['','Yes','No']})}
${field('Years Farming','farm.yearsFarming','text',{placeholder:'Example: 12 years'})}
${field('Total Acres','farm.totalAcres','number',{min:'0',step:'0.01'})}
${field('Acres Added (Optional)','farm.acresAdded','textarea',{cls:'half',placeholder:'Optional: acres added and brief notes'})}
<div class="field"><label>Acre Lost</label><select data-bind="farm.acresLost" onchange="saveInputs();render()">${options(['','Yes','No'],state.farm.acresLost)}</select></div>
${state.farm.acresLost==='Yes'?`${field('Acres Lost','farm.acresLostAmount','number',{min:'0',step:'0.01'})}${field('Why were acres lost?','farm.acresLostWhy','textarea',{cls:'half'})}`:''}
${field('Soil Lab Testing','farm.soilLabTesting','select',{options:['','Complete','Scheduled','N/A']})}
${field('Soil Field Testing','farm.soilFieldTesting','select',{options:['','Complete','Scheduled','N/A']})}
<div class="field"><label>Field Boundaries Mapped and Confirmed</label><select data-bind="farm.fieldBoundariesConfirmed" onchange="saveInputs();render()">${options(['','Yes','No'],state.farm.fieldBoundariesConfirmed)}</select></div>
${state.farm.fieldBoundariesConfirmed==='No'?field('If no, explain why boundaries are not confirmed','farm.fieldBoundariesWhyNo','textarea',{cls:'half'}):''}
${field('Number of Crops','farm.numberOfCrops','number',{min:'1',max:'10',step:'1'})}
<div class="field"><label>Do you have livestock?</label><select data-bind="farm.livestock" onchange="saveInputs();render()">${options(['','Yes','No'],state.farm.livestock)}</select></div>
${state.farm.livestock==='No'?field('If no livestock, explain why','farm.livestockWhyNo','textarea',{cls:'half'}):''}
${field('Farm notes','farm.notes','textarea',{cls:'full'})}</div></div><div class="card"><h3>Farm Goals</h3><div class="checkbox-grid">${GOALS.map(g=>`<label class="check-tile"><input type="checkbox" ${state.farm.goals.includes(g)?'checked':''} onchange="toggleGoal('${esc(g)}',this.checked)"><span>${esc(g)}</span></label>`).join('')}</div></div><div class="card"><div class="section-title"><div><h3>Crop Setup</h3><div class="help">Crop names, crop type, and acres flow into all original tool sections.</div></div><button class="btn ghost" onclick="syncCropCount()">Update Crop Pages</button></div>${state.crops.map((c,i)=>`<div class="crop-card"><div class="input-grid"><div class="field"><label>Crop Name</label><input data-bind="crops.${i}.name" value="${esc(c.name)}" placeholder="Corn, soybeans, rice..."></div><div class="field"><label>Crop Type</label><select data-bind="crops.${i}.cropType" onchange="saveInputs();render()">${options(CROP_TYPES,c.cropType)}</select></div>${c.cropType==='Other'?`<div class="field"><label>Other Crop Type</label><input data-bind="crops.${i}.cropTypeOther" value="${esc(c.cropTypeOther)}" placeholder="Type crop"></div>`:''}<div class="field"><label>Acres</label><input data-bind="crops.${i}.acres" type="number" min="0" step="0.01" value="${esc(c.acres)}"></div><div class="field"><label>No Till / Direct Seed</label><label class="check-tile" style="margin:0;min-height:40px"><input type="checkbox" data-bind="crops.${i}.noTill" ${String(c.noTill)==='true'||c.noTill===true?'checked':''}><span>No Till / Direct Seed</span></label></div><div class="field"><label>NON GMO</label><label class="check-tile" style="margin:0;min-height:40px"><input type="checkbox" data-bind="crops.${i}.nonGmo" ${String(c.nonGmo)==='true'||c.nonGmo===true?'checked':''}><span>NON GMO</span></label></div></div></div>`).join('')}</div>${nav(0,2)}</main>`}
function toggleGoal(g,on){saveInputs(); if(on&&!state.farm.goals.includes(g))state.farm.goals.push(g); if(!on)state.farm.goals=state.farm.goals.filter(x=>x!==g);render()}
function syncCropCount(){saveInputs();let n=Math.max(1,Math.min(MAX_CROPS,Math.round(num(state.farm.numberOfCrops)||1)));while(state.crops.length<n)state.crops.push(newCrop(state.crops.length+1));while(state.crops.length>n)state.crops.pop();state.activeCrop=Math.min(state.activeCrop,state.crops.length-1);render()}
function cropPlanner(){let c=crop();return`${stepBar()}<main class="page"><div class="crop-card"><div class="crop-head"><div class="field"><label>Crop Page Name</label><input data-bind="crops.${state.activeCrop}.name" value="${esc(c.name)}" placeholder="Corn, soybeans, wheat..."></div><div class="field"><label>Crop Acres</label><input data-bind="crops.${state.activeCrop}.acres" type="number" min="0" step="0.01" value="${esc(c.acres)}" placeholder="0"></div><div class="field"><label>Crop Fields</label><input data-bind="crops.${state.activeCrop}.fields" type="number" min="0" step="1" value="${esc(c.fields)}" placeholder="0" inputmode="numeric"></div><div class="field"><label>Crop Year</label><input data-bind="crops.${state.activeCrop}.year" type="number" min="1900" max="2200" step="1" value="${esc(c.year)}" placeholder="2026"></div></div>${cropTabs()}<div class="help">Cash crop is always included. Pre-season and post-harvest cover crops are optional in QA/QC and only counted when entered. Opening one section collapses the previous entry to save space.</div>${c.cropPlanner.map((e,i)=>`<div class="entry-card"><div class="entry-header"><span>${esc(e.title)}</span><span class="small">LRI ${lri(e).toFixed(2)}</span></div><div class="entry-body"><div class="field"><label>Planting Year</label><input data-bind="crops.${state.activeCrop}.cropPlanner.${i}.plantingYear" type="number" min="1900" max="2200" step="1" value="${esc(e.plantingYear)}" placeholder="2026"></div><div class="field span-3"><label>Crop / Cover Crop</label><input data-bind="crops.${state.activeCrop}.cropPlanner.${i}.crop" value="${esc(e.crop)}" placeholder="Corn, rye, radish..."></div><div class="field"><label>Variety</label><input data-bind="crops.${state.activeCrop}.cropPlanner.${i}.variety" value="${esc(e.variety)}" placeholder="Optional"></div><div class="field"><label>Seeding Rate lb/ac</label><input data-bind="crops.${state.activeCrop}.cropPlanner.${i}.seedingRate" type="number" min="0" step="0.01" value="${esc(e.seedingRate)}" placeholder="0"></div><div class="field"><label>Planting Date</label><input data-bind="crops.${state.activeCrop}.cropPlanner.${i}.plantingDate" type="date" value="${esc(e.plantingDate)}"></div><div class="field"><label>Harvest / Termination Date</label><input data-bind="crops.${state.activeCrop}.cropPlanner.${i}.harvestDate" type="date" value="${esc(e.harvestDate)}"></div><div class="field"><label>Termination Style</label><select data-bind="crops.${state.activeCrop}.cropPlanner.${i}.terminationStyle">${options(TERM,e.terminationStyle)}</select></div><div class="field"><label>LRI</label><input readonly value="${lri(e).toFixed(2)}"></div><div class="field full"><label>Notes</label><textarea data-bind="crops.${state.activeCrop}.cropPlanner.${i}.notes" placeholder="Optional notes">${esc(e.notes)}</textarea></div></div></div>`).join('')}</div>${nav(1,3)}</main>`}
function lri(e){if(!e.plantingDate||!e.harvestDate)return 0;let a=new Date(e.plantingDate),b=new Date(e.harvestDate);let d=Math.max(0,(b-a)/86400000);return d/365}
function harvestLog(){let c=crop();return`${stepBar()}<main class="page"><div class="crop-card"><div class="crop-head"><div class="field"><label>Crop Name</label><input data-bind="crops.${state.activeCrop}.name" value="${esc(c.name)}" placeholder="Corn, soybeans, rice..."></div><div class="field"><label>Crop Acres</label><input data-bind="crops.${state.activeCrop}.acres" type="number" min="0" step="0.01" value="${esc(c.acres)}" placeholder="0"></div><div class="field"><label>Crop Fields</label><input data-bind="crops.${state.activeCrop}.fields" type="number" min="0" step="1" value="${esc(c.fields)}" placeholder="0" inputmode="numeric"></div></div>${cropTabs()}<div class="section-title"><div><h3>Harvest Log</h3><div class="help">Enter yield per acre and unit for this crop. Total harvest is calculated as crop acres × yield per acre, matching the uploaded harvest sheet.</div></div><button class="btn ghost" onclick="addRow('harvestRows')">Add Harvest Entry</button></div><div class="table-wrap responsive-stack"><table><thead><tr><th>Yield/ac</th><th>Unit</th><th class="calc-output">Total Harvest</th><th>Notes</th><th></th></tr></thead><tbody>${c.harvestRows.map((r,i)=>`<tr><td data-label="Yield/ac"><input data-bind="crops.${state.activeCrop}.harvestRows.${i}.yieldAcre" type="number" min="0" step="0.01" value="${esc(r.yieldAcre)}" placeholder="0"></td><td data-label="Unit"><select data-bind="crops.${state.activeCrop}.harvestRows.${i}.unit">${options(HARVEST_UNITS,r.unit)}</select></td><td data-label="Total Harvest" class="readonly total-harvest calc-output">${fmt(num(c.acres)*num(r.yieldAcre))}</td><td data-label="Notes"><input data-bind="crops.${state.activeCrop}.harvestRows.${i}.notes" value="${esc(r.notes)}" placeholder="Optional"></td><td><button class="btn danger" onclick="removeRow('harvestRows',${i})">×</button></td></tr>`).join('')}</tbody></table></div></div>${nav(2,4)}</main>`}
function tillage(){let c=crop();if(String(c.noTill)==='true'||c.noTill===true)return`${stepBar()}<main class="page"><div class="card skip">${cropTabs()}<h2>${esc(c.name||'Crop')} — No Till / Direct Seed selected</h2><p class="help">Tillage event entry is skipped for this crop. Roll-up value: 0.</p><button class="btn ghost" onclick="saveInputs();crop().noTill=false;render()">Enter Tillage Implement Instead</button></div>${nav(3,5)}</main>`;return`${stepBar()}<main class="page"><div class="crop-card"><div class="crop-meta"><div class="field"><label>Crop Name</label><input data-bind="crops.${state.activeCrop}.name" value="${esc(c.name)}" placeholder="Corn, Soybeans, Wheat..."></div><div class="field"><label>Crop Acres</label><input data-bind="crops.${state.activeCrop}.acres" type="number" min="0" step="0.01" value="${esc(c.acres)}" placeholder="0" inputmode="decimal"></div><div class="field"><label>Crop Fields</label><input data-bind="crops.${state.activeCrop}.fields" type="number" min="0" step="1" value="${esc(c.fields)}" placeholder="0" inputmode="numeric"></div></div>${cropTabs()}<div class="section-title"><div><h3>Tillage Intensity Calculator</h3><div class="help">Uses the original gTIR input structure from the source tool.</div></div><button class="btn ghost" onclick="addRow('tillageRows')">+ Add Tillage Implement</button></div>${c.tillageRows.map((r,i)=>tillageRow(r,i)).join('')}</div>${nav(3,5)}</main>`}
function tillageRow(r,i){let rating=(TILLAGE_RATINGS.find(x=>x.label===r.tillageType)||{}).rating||0, depthCm=num(r.depthIn)*2.54, acres=num(crop().acres)*(num(r.disturbed)/100), gtir=rating*depthCm*num(r.passes)*(num(r.disturbed)/100);return`<div class="event-card event-row"><div class="event-header"><span class="event-title e-title">Tillage Event</span><span class="event-status">${gtir?'Complete':'Incomplete'}</span><button class="btn danger" onclick="removeRow('tillageRows',${i})">✕</button></div><div class="event-body"><div class="field"><label>Tillage Date</label><input data-bind="crops.${state.activeCrop}.tillageRows.${i}.date" type="date" value="${esc(r.date)}"></div><div class="field"><label>Depth (in)</label><input data-bind="crops.${state.activeCrop}.tillageRows.${i}.depthIn" type="number" min="0" step="0.01" value="${esc(r.depthIn)}" placeholder="0" inputmode="decimal"></div><div class="field span-3"><label>Tillage Implement</label><input data-bind="crops.${state.activeCrop}.tillageRows.${i}.implement" value="${esc(r.implement)}" placeholder="Disk, ripper, chisel plow..."></div><div class="field span-3"><label>Tillage Type</label><select data-bind="crops.${state.activeCrop}.tillageRows.${i}.tillageType"><option value="">Select tillage type / rating...</option>${TILLAGE_RATINGS.map(x=>`<option value="${x.label}" ${r.tillageType===x.label?'selected':''}>${x.label}</option>`).join('')}</select></div><div class="field"><label>% Disturbed</label><input data-bind="crops.${state.activeCrop}.tillageRows.${i}.disturbed" type="number" min="0" max="100" step="0.01" value="${esc(r.disturbed)}" placeholder="100" inputmode="decimal"></div><div class="field"><label># Passes</label><input data-bind="crops.${state.activeCrop}.tillageRows.${i}.passes" type="number" min="0" step="0.01" value="${esc(r.passes)}" placeholder="1" inputmode="decimal"></div><div class="field"><label>Rating</label><div class="readout rating">${fmt(rating)}</div></div><div class="field"><label>Depth (cm)</label><div class="readout depth-cm">${fmt(depthCm)}</div></div><div class="field"><label>Acres Tilled</label><div class="readout acres-tilled">${fmt(acres)}</div></div><div class="field"><label>gTIR</label><div class="readout gtir" style="color:var(--leaf);font-size:18px;">${fmt(gtir)}</div></div><div class="field full"><label>Notes</label><input data-bind="crops.${state.activeCrop}.tillageRows.${i}.notes" value="${esc(r.notes)}" placeholder="Optional notes..."></div></div></div>`}
function nutrientPlan(){let c=crop();return`${stepBar()}<main class="page"><div class="crop-card"><div class="crop-head"><div class="field"><label>Crop Name</label><input data-bind="crops.${state.activeCrop}.name" value="${esc(c.name)}" placeholder="Corn, soybeans, wheat..."></div><div class="field"><label>Crop Acres</label><input data-bind="crops.${state.activeCrop}.acres" type="number" min="0" step="0.01" value="${esc(c.acres)}" placeholder="0"></div><div class="field"><label>Crop Fields</label><input data-bind="crops.${state.activeCrop}.fields" type="number" min="0" step="1" value="${esc(c.fields)}" placeholder="0" inputmode="numeric"></div></div>${cropTabs()}<div class="section-title"><div><h3>Fertilizer Products</h3><div class="help">Enter average product rate per acre and N-P-K percentages. Use 0 for any nutrient that does not apply.</div></div><button class="btn ghost" onclick="addRow('fertilizerRows')">Add Fertilizer Product</button></div><div class="table-wrap responsive-stack"><table><thead><tr><th style="width:170px">Product Name</th><th>Application Date</th><th>Rate / Acre</th><th>Unit</th><th class="calc-output">Equivalent lbs / Acre</th><th>N %</th><th>P %</th><th>K %</th><th class="calc-output">Units N / Acre</th><th class="calc-output">Units P / Acre</th><th class="calc-output">Units K / Acre</th><th>Notes</th><th></th></tr></thead><tbody>${c.fertilizerRows.map((r,i)=>fertRow(r,i)).join('')}</tbody></table></div><div class="crop-actions optional-add-actions" style="margin-top:8px"><button class="btn ghost" onclick="addRow('microRows')">+ Add Optional Fertility Pack / Micronutrients</button><button class="btn ghost" onclick="addRow('amendmentRows')">+ Add Optional Organic Input</button></div>${c.microRows.length?microTable(c):''}${c.amendmentRows.length?amendTable(c):''}</div>${nav(4,6)}</main>`}
function fertRow(r,i){let lbs=r.unit==='Tons'?num(r.rateAcre)*2000:r.unit==='lbs'?num(r.rateAcre):0;let n=lbs*num(r.nPct)/100,p=lbs*num(r.pPct)/100,k=lbs*num(r.kPct)/100;return`<tr><td data-label="Product Name"><input data-bind="crops.${state.activeCrop}.fertilizerRows.${i}.productName" value="${esc(r.productName)}" placeholder="Urea, DAP, potash..."></td><td data-label="Application Date"><input data-bind="crops.${state.activeCrop}.fertilizerRows.${i}.applicationDate" type="date" value="${esc(r.applicationDate)}"></td><td data-label="Rate / Acre"><input data-bind="crops.${state.activeCrop}.fertilizerRows.${i}.rateAcre" type="number" min="0" step="0.01" value="${esc(r.rateAcre)}" placeholder="0"></td><td data-label="Unit"><select data-bind="crops.${state.activeCrop}.fertilizerRows.${i}.unit">${options(PRODUCT_UNITS,r.unit)}</select></td><td data-label="Equivalent lbs / Acre" class="readonly product-lbs-eq calc-output">${fmt(lbs)}</td><td data-label="N %"><input data-bind="crops.${state.activeCrop}.fertilizerRows.${i}.nPct" type="number" min="0" max="100" step="0.01" value="${esc(r.nPct)}" placeholder="0"></td><td data-label="P %"><input data-bind="crops.${state.activeCrop}.fertilizerRows.${i}.pPct" type="number" min="0" max="100" step="0.01" value="${esc(r.pPct)}" placeholder="0"></td><td data-label="K %"><input data-bind="crops.${state.activeCrop}.fertilizerRows.${i}.kPct" type="number" min="0" max="100" step="0.01" value="${esc(r.kPct)}" placeholder="0"></td><td data-label="Units N / Acre" class="readonly n-acre calc-output">${fmt(n)}</td><td data-label="Units P / Acre" class="readonly p-acre calc-output">${fmt(p)}</td><td data-label="Units K / Acre" class="readonly k-acre calc-output">${fmt(k)}</td><td data-label="Notes"><input data-bind="crops.${state.activeCrop}.fertilizerRows.${i}.notes" value="${esc(r.notes)}" placeholder="Optional"></td><td><button class="btn danger" onclick="removeRow('fertilizerRows',${i})">×</button></td></tr>`}
function microTable(c){return`<div class="section-title"><div><h3>Fertility Pack / Micronutrients</h3><div class="help">Only shown when added.</div></div></div><div class="table-wrap responsive-stack"><table><thead><tr><th style="width:210px">Pack / Product Name</th><th>Application Date</th><th style="width:360px">What It Contains</th><th>Rate / Acre</th><th>Unit</th><th>Total Product</th><th>Notes</th><th></th></tr></thead><tbody>${c.microRows.map((r,i)=>`<tr><td data-label="Pack / Product Name"><input data-bind="crops.${state.activeCrop}.microRows.${i}.name" value="${esc(r.name||'')}" placeholder="Micronutrient pack"></td><td data-label="Application Date"><input data-bind="crops.${state.activeCrop}.microRows.${i}.date" type="date" value="${esc(r.date||'')}"></td><td data-label="What It Contains"><input data-bind="crops.${state.activeCrop}.microRows.${i}.contains" value="${esc(r.contains||'')}" placeholder="Boron, zinc, manganese, sulfur..."></td><td data-label="Rate / Acre"><input data-bind="crops.${state.activeCrop}.microRows.${i}.rate" type="number" min="0" step="0.01" value="${esc(r.rate||'')}" placeholder="0"></td><td data-label="Unit"><select data-bind="crops.${state.activeCrop}.microRows.${i}.unit">${options(['lbs','Fluid oz','Tons','Gallons'],r.unit||'lbs')}</select></td><td data-label="Total Product" class="readonly micro-total">${fmt(num(r.rate)*num(c.acres))}</td><td data-label="Notes"><input data-bind="crops.${state.activeCrop}.microRows.${i}.notes" value="${esc(r.notes||'')}" placeholder="Optional"></td><td><button class="btn danger" onclick="removeRow('microRows',${i})">×</button></td></tr>`).join('')}</tbody></table></div>`}
function amendTable(c){return`<div class="section-title"><div><h3>Organic Inputs</h3><div class="help">Only shown when added.</div></div></div><div class="table-wrap responsive-stack"><table><thead><tr><th>Application Type</th><th>Application Date</th><th>Product / Source</th><th>Rate / Acre</th><th>Unit</th><th>Total Product</th><th>Notes</th><th></th></tr></thead><tbody>${c.amendmentRows.map((r,i)=>`<tr><td data-label="Application Type"><select data-bind="crops.${state.activeCrop}.amendmentRows.${i}.type">${options(AMEND_TYPES,r.type||'Compost')}</select></td><td data-label="Application Date"><input data-bind="crops.${state.activeCrop}.amendmentRows.${i}.date" type="date" value="${esc(r.date||'')}"></td><td data-label="Product / Source"><input data-bind="crops.${state.activeCrop}.amendmentRows.${i}.name" value="${esc(r.name||'')}" placeholder="Product, source, or blend"></td><td data-label="Rate / Acre"><input data-bind="crops.${state.activeCrop}.amendmentRows.${i}.rate" type="number" min="0" step="0.01" value="${esc(r.rate||'')}" placeholder="0"></td><td data-label="Unit"><select data-bind="crops.${state.activeCrop}.amendmentRows.${i}.unit">${options(['Tons','lbs','Gallons','Fluid oz'],r.unit||'Tons')}</select></td><td data-label="Total Product" class="readonly amendment-total">${fmt(num(r.rate)*num(c.acres))}</td><td data-label="Notes"><input data-bind="crops.${state.activeCrop}.amendmentRows.${i}.notes" value="${esc(r.notes||'')}" placeholder="Optional"></td><td><button class="btn danger" onclick="removeRow('amendmentRows',${i})">×</button></td></tr>`).join('')}</tbody></table></div>`}
function ipmPlan(){let c=crop();return`${stepBar()}<main class="page"><div class="crop-card"><div class="crop-head"><div class="field"><label>Crop Name</label><input data-bind="crops.${state.activeCrop}.name" value="${esc(c.name)}" placeholder="Corn, soybeans, wheat..."></div><div class="field"><label>Crop Acres</label><input data-bind="crops.${state.activeCrop}.acres" type="number" min="0" step="0.01" value="${esc(c.acres)}" placeholder="0"></div><div class="field"><label>Crop Fields</label><input data-bind="crops.${state.activeCrop}.fields" type="number" min="0" step="1" value="${esc(c.fields)}" placeholder="0" inputmode="numeric"></div></div>${cropTabs()}<div class="section-title"><div><h3>IPM Inputs</h3><div class="help">Original IPM Plan input structure for pest and pesticide stewardship tracking.</div></div><button class="btn ghost" onclick="addRow('ipmRows')">Add IPM Entry</button></div><div class="table-wrap responsive-stack"><table><thead><tr><th>Application Date</th><th>Weed or Pest</th><th>Product Name</th><th>EPA Reg No</th><th>Unit</th><th>Amount / Acre</th><th>% Active Ingredient</th><th>Application Method</th><th>Area Applied (acres)</th><th>Active Ingredient / Acre</th><th>Total Active Ingredient</th><th>Notes</th><th>Remove</th></tr></thead><tbody>${c.ipmRows.map((r,i)=>ipmRow(r,i)).join('')}</tbody></table></div></div>${nav(5,7)}</main>`}
function ipmRow(r,i){let aiA=num(r.amountAcre)*num(r.activePct)/100,total=aiA*(num(r.areaApplied)||num(crop().acres));return`<tr><td data-label="Application Date"><input data-bind="crops.${state.activeCrop}.ipmRows.${i}.applicationDate" type="date" value="${esc(r.applicationDate)}"></td><td data-label="Weed or Pest"><input data-bind="crops.${state.activeCrop}.ipmRows.${i}.pest" value="${esc(r.pest)}" placeholder="Grass, broadleaf, insect..."></td><td data-label="Product Name"><input data-bind="crops.${state.activeCrop}.ipmRows.${i}.productName" value="${esc(r.productName)}" placeholder="Product name"></td><td data-label="EPA Reg No"><input data-bind="crops.${state.activeCrop}.ipmRows.${i}.epaRegNo" value="${esc(r.epaRegNo)}" placeholder="12345-678"></td><td data-label="Unit"><select data-bind="crops.${state.activeCrop}.ipmRows.${i}.unit">${options(IPM_UNITS,r.unit)}</select></td><td data-label="Amount / Acre"><input data-bind="crops.${state.activeCrop}.ipmRows.${i}.amountAcre" type="number" min="0" step="0.001" value="${esc(r.amountAcre)}" placeholder="0"></td><td data-label="% Active Ingredient"><input data-bind="crops.${state.activeCrop}.ipmRows.${i}.activePct" type="number" min="0" max="100" step="0.01" value="${esc(r.activePct)}" placeholder="41" inputmode="decimal"></td><td data-label="Application Method"><select data-bind="crops.${state.activeCrop}.ipmRows.${i}.applicationMethod">${options(IPM_METHODS,r.applicationMethod)}</select></td><td data-label="Area Applied (acres)"><input data-bind="crops.${state.activeCrop}.ipmRows.${i}.areaApplied" type="number" min="0" step="0.01" value="${esc(r.areaApplied)}" placeholder="0"></td><td data-label="Active Ingredient / Acre" class="readonly ai-acre">${fmt(aiA)}</td><td data-label="Total Active Ingredient" class="readonly ai-total">${fmt(total)}</td><td data-label="Notes"><input data-bind="crops.${state.activeCrop}.ipmRows.${i}.notes" value="${esc(r.notes)}" placeholder="Optional"></td><td data-label="Remove"><button class="btn danger" onclick="removeRow('ipmRows',${i})">Remove Entry</button></td></tr>`}
function dieselLog(){let c=crop();return`${stepBar()}<main class="page"><div class="card"><div class="section-title"><div><h2>Diesel Log <span class="small">optional</span></h2><div class="help">Turn on to include diesel CSV in the ZIP and roll-up.</div></div><button class="btn ${state.dieselEnabled?'secondary':'ghost'}" onclick="saveInputs();state.dieselEnabled=!state.dieselEnabled;render()">${state.dieselEnabled?'Enabled':'Skipped'}</button></div></div>${!state.dieselEnabled?`<div class="card"><div class="note">Diesel Log is currently skipped.</div></div>${nav(6,8)}`:`<div class="crop-card"><div class="crop-head"><div class="field"><label>Crop Name</label><input data-bind="crops.${state.activeCrop}.name" value="${esc(c.name)}" placeholder="Corn, soybeans, rice..."></div><div class="field"><label>Crop Acres</label><input data-bind="crops.${state.activeCrop}.acres" type="number" min="0" step="0.01" value="${esc(c.acres)}" placeholder="0"></div><div class="field"><label>Crop Fields</label><input data-bind="crops.${state.activeCrop}.fields" type="number" min="0" step="1" value="${esc(c.fields)}" placeholder="0" inputmode="numeric"></div></div>${cropTabs()}<div class="section-title"><div><h3>Diesel Use Log</h3><div class="help">Original diesel practice columns in gallons.</div></div><button class="btn ghost" onclick="addRow('dieselRows')">Add Diesel Entry</button></div><div class="table-wrap responsive-stack"><table><thead><tr>${DIESEL_PRACTICES.map(x=>`<th>${x[1]}</th>`).join('')}<th class="calc-output">Total Annual Diesel Use</th><th>Notes</th><th></th></tr></thead><tbody>${c.dieselRows.map((r,i)=>`<tr>${DIESEL_PRACTICES.map(([key,label])=>`<td data-label="${label}"><input data-bind="crops.${state.activeCrop}.dieselRows.${i}.${key}" type="number" min="0" step="0.01" value="${esc(r[key]||'')}" placeholder="0"></td>`).join('')}<td class="readonly calc-output">${fmt(dieselTotal(r),0)}</td><td><input data-bind="crops.${state.activeCrop}.dieselRows.${i}.notes" value="${esc(r.notes||'')}" placeholder="Optional"></td><td><button class="btn danger" onclick="removeRow('dieselRows',${i})">×</button></td></tr>`).join('')}</tbody></table></div></div>${nav(6,8)}`}</main>`}
function dieselTotal(r){return DIESEL_PRACTICES.reduce((s,[k])=>s+num(r[k]),0)}
function irrigationLog(){let c=crop();return`${stepBar()}<main class="page"><div class="card"><div class="section-title"><div><h2>Irrigation Log <span class="small">optional</span></h2><div class="help">Turn on to include irrigation CSV in the ZIP and roll-up.</div></div><button class="btn ${state.irrigationEnabled?'secondary':'ghost'}" onclick="saveInputs();state.irrigationEnabled=!state.irrigationEnabled;render()">${state.irrigationEnabled?'Enabled':'Skipped'}</button></div></div>${!state.irrigationEnabled?`<div class="card"><div class="note">Irrigation Log is currently skipped.</div></div>${nav(7,9)}`:`<div class="crop-card"><div class="crop-head"><div class="field"><label>Crop Name</label><input data-bind="crops.${state.activeCrop}.name" value="${esc(c.name)}" placeholder="Corn, soybeans, rice..."></div><div class="field"><label>Crop Acres</label><input data-bind="crops.${state.activeCrop}.acres" type="number" min="0" step="0.01" value="${esc(c.acres)}" placeholder="0"></div><div class="field"><label>Crop Fields</label><input data-bind="crops.${state.activeCrop}.fields" type="number" min="0" step="1" value="${esc(c.fields)}" placeholder="0" inputmode="numeric"></div></div>${cropTabs()}<div class="section-title"><div><h3>Irrigation Log</h3><div class="help">Same ARVA irrigation logic: crop/practice type, rice methods, drip fields, pivot/sprinkler fields, and pump/system GPM fallback.</div></div><button class="btn ghost" onclick="addRow('irrigationRows')">Add Irrigation Entry</button></div><div class="table-wrap responsive-stack"><table><thead><tr><th>Crop / Practice Type</th><th>Water / Irrigation Method</th><th>Drainage Type</th><th>Irrigated Acres</th><th>Pump Name</th><th>Water Source</th><th>Pump / System GPM Fallback</th><th>Emitter GPM</th><th>Emitter Spacing ft</th><th>Drip Row Spacing ft</th><th>Sprinkler / Nozzle GPM</th><th>Sprinkler Spacing ft</th><th>Lateral / Tower Spacing ft</th><th>Min hrs / Cycle</th><th>Max hrs / Cycle</th><th>Min Cycles / Year</th><th>Max Cycles / Year</th><th>AWD Events</th><th class="calc-output">Gallons / Year</th><th class="calc-output">Acre-Feet / Year</th><th>Notes</th><th></th></tr></thead><tbody>${c.irrigationRows.map((r,i)=>irrigationRow(r,i)).join('')}</tbody></table></div></div>${nav(7,9)}`}</main>`}
function irrigationRow(r,i){let methods=r.cropPractice==='Rice Farming'?METHODS_RICE:METHODS_NON_RICE,g=irrigGallons(r),af=g/325851;return`<tr><td data-label="Crop / Practice Type"><select data-bind="crops.${state.activeCrop}.irrigationRows.${i}.cropPractice">${options(['Non-rice crop','Rice Farming'],r.cropPractice)}</select></td><td data-label="Water / Irrigation Method"><select data-bind="crops.${state.activeCrop}.irrigationRows.${i}.method">${options(methods,r.method)}</select></td><td data-label="Drainage Type"><select data-bind="crops.${state.activeCrop}.irrigationRows.${i}.drainageType">${options(DRAINAGE_TYPES,r.drainageType)}</select></td><td data-label="Irrigated Acres"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.irrigatedAcres" type="number" min="0" step="0.01" value="${esc(r.irrigatedAcres)}" placeholder="Crop acres"></td><td data-label="Pump Name"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.pumpName" value="${esc(r.pumpName)}" placeholder="e.g. Weining Pump"></td><td data-label="Water Source"><select data-bind="crops.${state.activeCrop}.irrigationRows.${i}.waterSource">${options(WATER_SOURCES,r.waterSource)}</select></td><td data-label="Pump / System GPM Fallback"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.pumpGpm" type="number" min="0" step="0.01" value="${esc(r.pumpGpm)}" placeholder="e.g. 1200"></td><td data-label="Emitter GPM"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.emitterGpm" type="number" min="0" step="0.0001" value="${esc(r.emitterGpm)}" placeholder="e.g. 0.02"></td><td data-label="Emitter Spacing ft"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.emitterSpacing" type="number" min="0" step="0.01" value="${esc(r.emitterSpacing)}" placeholder="e.g. 1"></td><td data-label="Drip Row Spacing ft"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.rowSpacing" type="number" min="0" step="0.01" value="${esc(r.rowSpacing)}" placeholder="e.g. 5"></td><td data-label="Sprinkler / Nozzle GPM"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.sprinklerGpm" type="number" min="0" step="0.0001" value="${esc(r.sprinklerGpm)}" placeholder="e.g. 12"></td><td data-label="Sprinkler Spacing ft"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.sprinklerSpacing" type="number" min="0" step="0.01" value="${esc(r.sprinklerSpacing)}" placeholder="e.g. 40"></td><td data-label="Lateral / Tower Spacing ft"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.lateralSpacing" type="number" min="0" step="0.01" value="${esc(r.lateralSpacing)}" placeholder="e.g. 40"></td><td data-label="Min hrs / Cycle"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.minHours" type="number" min="0" step="0.01" value="${esc(r.minHours)}" placeholder="e.g. 18"></td><td data-label="Max hrs / Cycle"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.maxHours" type="number" min="0" step="0.01" value="${esc(r.maxHours)}" placeholder="e.g. 30"></td><td data-label="Min Cycles / Year"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.minCycles" type="number" min="0" step="0.01" value="${esc(r.minCycles)}" placeholder="e.g. 4"></td><td data-label="Max Cycles / Year"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.maxCycles" type="number" min="0" step="0.01" value="${esc(r.maxCycles)}" placeholder="e.g. 4"></td><td data-label="AWD Events"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.awdEvents" type="number" min="0" step="1" value="${esc(r.awdEvents)}" placeholder="Rice only"></td><td data-label="Gallons / Year" class="readonly gallons-year calc-output">${Math.round(g).toLocaleString()}</td><td data-label="Acre-Feet / Year" class="readonly acrefeet-year calc-output">${fmt(af,3)}</td><td data-label="Notes"><input data-bind="crops.${state.activeCrop}.irrigationRows.${i}.notes" value="${esc(r.notes)}" placeholder="Optional"></td><td><button class="btn danger" onclick="removeRow('irrigationRows',${i})">×</button></td></tr>`}
function irrigGallons(r){if(r.method==='Rain Fed Only')return 0;let hrs=(num(r.minHours)+num(r.maxHours))/2,cyc=(num(r.minCycles)+num(r.maxCycles))/2,gpm=num(r.pumpGpm);return gpm*60*hrs*cyc}
function addRow(key){saveInputs();let c=crop();let map={harvestRows:{yieldAcre:'',unit:'bu',notes:''},tillageRows:{date:'',depthIn:'',implement:'',tillageType:'',disturbed:'100',passes:'1',notes:''},fertilizerRows:{productName:'',applicationDate:'',rateAcre:'',unit:'lbs',nPct:'',pPct:'',kPct:'',notes:''},microRows:{name:'',date:'',contains:'',rate:'',unit:'lbs',notes:''},amendmentRows:{type:'Compost',date:'',name:'',rate:'',unit:'Tons',notes:''},ipmRows:{applicationDate:'',pest:'',productName:'',epaRegNo:'',unit:'lb/acre',amountAcre:'',activePct:'',applicationMethod:'',areaApplied:'',notes:''},dieselRows:{},irrigationRows:{cropPractice:'Non-rice crop',method:'',drainageType:'',irrigatedAcres:'',pumpName:'',waterSource:'',pumpGpm:'',emitterGpm:'',emitterSpacing:'',rowSpacing:'',sprinklerGpm:'',sprinklerSpacing:'',lateralSpacing:'',minHours:'',maxHours:'',minCycles:'',maxCycles:'',awdEvents:'',notes:''}};c[key].push({...map[key]});render()}
function removeRow(key,i){saveInputs();let arr=crop()[key];arr.splice(i,1);if(!arr.length)addRow(key);else render()}
function tillageValue(c){if(String(c.noTill)==='true'||c.noTill===true)return 0;return c.tillageRows.reduce((s,r)=>{let rating=(TILLAGE_RATINGS.find(x=>x.label===r.tillageType)||{}).rating||0;return s+rating*(num(r.depthIn)*2.54)*num(r.passes)*(num(r.disturbed)/100)},0)}
function livingRootPct(c){let days=c.cropPlanner.reduce((s,e)=>{if(!e.plantingDate||!e.harvestDate)return s;return s+Math.max(0,(new Date(e.harvestDate)-new Date(e.plantingDate))/86400000)},0);return Math.min(100,Math.round(days/365*100))}
function pillar(c){let ti=tillageValue(c),p1=ti<=60?'IV':ti<=80?'III':ti<=100?'II':ti<=120?'I':'Gap';let rp=livingRootPct(c),p2=rp>=80?'IV':rp>=70?'III':rp>=60?'II':rp>=50?'I':'Gap';let fert=c.fertilizerRows.length,p5=fert?'I':'Gap';let ipm=c.ipmRows.length,p5i=ipm?'I':'Gap';return{P1:p1,P2:p2,P3:'Planning',P4:'Planning',P5:p5,P5_IPM:p5i,P6:'Planning',P7:state.farm.livestock==='Yes'?'I':state.farm.livestock==='No'?'N/A':'Gap',TI:ti,rootPct:rp}}
function rollup(){
saveInputs();
let acres=state.crops.reduce((s,c)=>s+num(c.acres),0);
let avg=state.crops.length?state.crops.reduce((s,c)=>s+tillageValue(c),0)/state.crops.length:0;
let plannerEntries=state.crops.reduce((s,c)=>s+(c.cropPlanner||[]).filter(e=>e.crop||e.plantingDate||e.harvestDate).length,0);
let fertRows=state.crops.reduce((s,c)=>s+(c.fertilizerRows||[]).filter(r=>r.product||r.rate||r.nUnits).length,0);
let ipmRows=state.crops.reduce((s,c)=>s+(c.ipmRows||[]).filter(r=>r.product||r.rate||r.activeIngredient).length,0);
let dieselRows=state.crops.reduce((s,c)=>s+(c.dieselRows||[]).filter(r=>r.equipment||r.gallons).length,0);
let irrRows=state.crops.reduce((s,c)=>s+(c.irrigationRows||[]).filter(r=>r.method||r.waterSource||r.acreFeet).length,0);
let cropTypes=[...new Set(state.crops.map(c=>c.cropType==='Other'?(c.cropTypeOther||'Other'):c.cropType).filter(Boolean))];
let rank={Gap:0,I:1,II:2,III:3,IV:4,Planning:2,'N/A':3};
let levelClass=v=>v==='Planning'?'compliance-pending':(v==='N/A'?'compliant':'level-'+String(v).replace(/[^A-Za-z]/g,''));
let minStatus=(key)=>{let vals=state.crops.map(c=>pillar(c)[key]).filter(Boolean); if(!vals.length)return 'Gap'; return vals.sort((a,b)=>(rank[a]||0)-(rank[b]||0))[0]};
let p1=minStatus('P1'),p2=minStatus('P2'),p5=minStatus('P5'),p5i=minStatus('P5_IPM');
let p5Final=(rank[p5]||0)<=(rank[p5i]||0)?p5:p5i;
let p7=state.farm.livestock==='Yes'?'I':state.farm.livestock==='No'?'N/A':'Gap';
let pillars=[
 {num:'P1',title:'Appropriate Tillage',subtitle:'Tillage intensity and no-till planning',status:p1,evidence:[`Farm average gTIR: ${fmt(avg,1)}`,`${state.crops.length} crop plan${state.crops.length===1?'':'s'} reviewed`]},
 {num:'P2',title:'Living Roots',subtitle:'Crop planner planting and harvest windows',status:p2,evidence:[`Crop planner entries: ${plannerEntries}`,`Living root estimates are calculated from entered crop dates`]},
 {num:'P3',title:'Soil Cover',subtitle:'Crop, harvest, and tillage planning evidence',status:'Planning',evidence:['Farm plan captures crop, harvest, and tillage sections for review','Confirm residue and cover evidence during audit review']},
 {num:'P4',title:'Biodiversity / Crop Diversity',subtitle:'Crop diversity and farm goals',status:'Planning',evidence:[`Crop types documented: ${cropTypes.length||0}`,`Farm goals: ${(state.farm.goals||[]).join(', ')||'Not entered'}`]},
 {num:'P5',title:'Nutrient Management & IPM',subtitle:'Nutrient plan and crop protection sections',status:p5Final,evidence:[`Nutrient management entries: ${fertRows}`,`IPM entries: ${ipmRows}`]},
 {num:'P6',title:'Continuous Learning',subtitle:'Farm goals and improvement planning',status:'Planning',evidence:['Use the exported Farm Plan Report with learning records to confirm this pillar']},
 {num:'P7',title:'Livestock Integration',subtitle:'Livestock status and explanation',status:p7,evidence:[`Livestock selected: ${state.farm.livestock||'Not entered'}`,state.farm.livestock==='No'?`Explanation: ${state.farm.livestockWhyNo||'Not entered'}`:'Review livestock integration details if applicable']},
 {num:'§7',title:'Soil Testing Readiness',subtitle:'Soil lab and field testing status',status:(state.farm.soilLabTesting&&state.farm.soilFieldTesting)?'Requirements Met':'Upload / Complete',isCompliance:true,compliance:!!(state.farm.soilLabTesting&&state.farm.soilFieldTesting),evidence:[`Soil lab testing: ${state.farm.soilLabTesting||'Not entered'}`,`Soil field testing: ${state.farm.soilFieldTesting||'Not entered'}`]}
];
let topMetrics=[
 ['Farm',esc(state.farm.farmName||'Unnamed'),esc(state.farm.state||'State not entered')],
 ['Crops',state.crops.length,'Crop plan sections'],
 ['Total Crop Acres',fmt(acres,1),'Entered crop acres'],
 ['Avg gTIR',fmt(avg,1),'Planning estimate']
].map(m=>`<div class="metric"><div class="label">${m[0]}</div><div class="value">${m[1]}</div><div class="small">${m[2]}</div></div>`).join('');
let rowHTML=pillars.map(p=>{let badgeClass=p.isCompliance?(p.compliance?'compliant':'not-compliant'):levelClass(p.status);let badgeLabel=p.isCompliance?(p.compliance?'✓ Requirements Met':'✗ Requirements Not Met'):p.status;let evidence=(p.evidence||[]).map(e=>`${p.isCompliance?(p.compliance?'✅':'⚠️'):'•'} ${esc(e)}`).join('<br>');return `<tr><td><strong>${esc(p.num)}</strong></td><td><strong>${esc(p.title)}</strong><br><span class="roll-help">${esc(p.subtitle||'')}</span></td><td><span class="pill ${badgeClass}">${esc(badgeLabel)}</span></td><td>${evidence}</td></tr>`}).join('');
let summaryItems=`
 <div class="ds-cell"><div class="ds-cell-val">${fmt(avg,1)}</div><div class="ds-cell-lbl">Farm Avg gTIR</div></div>
 <div class="ds-cell"><div class="ds-cell-val">${fmt(acres,1)}</div><div class="ds-cell-lbl">Total Acres</div></div>
 <div class="ds-cell"><div class="ds-cell-val">${state.crops.length}</div><div class="ds-cell-lbl">Crops</div></div>
 <div class="ds-cell"><div class="ds-cell-val">${plannerEntries}</div><div class="ds-cell-lbl">Crop Planner Entries</div></div>
 <div class="ds-cell"><div class="ds-cell-val">${fertRows}</div><div class="ds-cell-lbl">Nutrient Entries</div></div>
 <div class="ds-cell"><div class="ds-cell-val">${ipmRows}</div><div class="ds-cell-lbl">IPM Entries</div></div>
 <div class="ds-cell"><div class="ds-cell-val">${dieselRows}</div><div class="ds-cell-lbl">Diesel Entries</div></div>
 <div class="ds-cell"><div class="ds-cell-val">${irrRows}</div><div class="ds-cell-lbl">Irrigation Entries</div></div>`;
let qaqcHTML=qaqc().map(x=>`<div class="qaqc-item"><span>${x.ok?'✅':'⚠️'}</span><span>${esc(x.msg)}</span></div>`).join('');
return`${stepBar()}<main class="page">
 <div class="roll-card">
  <div class="roll-section-title">
   <div><h2>End Roll Up</h2><div class="roll-help">Relevant data flows here from the completed Farm Plan Report Builder sections.</div></div>
   <div class="roll-actions"><button class="roll-btn" onclick="download()">Export CSV Report</button><button class="roll-btn secondary" onclick="downloadPDF()">PDF Report</button><button class="roll-btn ghost" onclick="downloadZip()">ZIP All Datasets</button></div>
  </div>
  <div class="summary-grid">${topMetrics}</div>
 </div>
 <div class="roll-card">
  <h3>Pillar Engagement Auto-Estimate</h3>
  <div class="roll-help">Planning estimate only, not a final verification decision.</div>
  <div class="table-wrap" style="margin-top:8px"><table class="roll-table"><thead><tr><th>Pillar</th><th>Standard Area</th><th>Estimated Status</th><th>Parsed Evidence / Notes</th></tr></thead><tbody>${rowHTML}</tbody></table></div>
 </div>
 <div class="roll-card">
  <h3>Key Data Parsed from Workflow</h3>
  <div class="roll-help">Values extracted directly from the Report Builder sections.</div>
  <div class="data-summary" style="margin-top:8px;margin-bottom:0"><div class="ds-grid">${summaryItems}</div></div>
 </div>
 <div class="roll-card"><h3>QA/QC Review</h3>${qaqcHTML}</div>
 <div class="roll-card"><h3>Report Note</h3><p class="roll-help"><strong>Important — Estimation Only:</strong> This roll-up organizes the data entered in the Farm Plan Report Builder into the same review structure as the Pillar Engagement tool. Final Engagement Level determination requires full review by the applicable program or audit process.</p></div>
 <div class="footer-nav"><button class="btn ghost" onclick="setStep(8)">← Edit Irrigation</button><button class="btn" onclick="downloadZip()">Download Complete ZIP</button></div>
</main>`
}

function qaqc(){let f=state.farm,out=[];out.push({ok:!!f.farmName,msg:'Farm name entered'});out.push({ok:!!f.contactName&&!!f.email&&!!f.phone,msg:'Contact name, email, and phone entered'});out.push({ok:!!f.state&&!!f.usdaZone&&!!f.firstFrost&&!!f.lastFrost,msg:'State, USDA growing zone, first frost, and last frost entered'});out.push({ok:!!f.nrcs,msg:'NRCS participation Yes/No selected'});out.push({ok:!!f.soilLabTesting,msg:'Soil lab testing status selected'});out.push({ok:!!f.soilFieldTesting,msg:'Soil field testing status selected'});out.push({ok:!!f.fieldBoundariesConfirmed&&(f.fieldBoundariesConfirmed==='Yes'||!!f.fieldBoundariesWhyNo),msg:'Field boundaries mapped/confirmed; if No, explanation provided'});out.push({ok:!!f.acresLost&&(f.acresLost==='No'||(!!f.acresLostAmount&&!!f.acresLostWhy)),msg:'Acre lost status documented; if Yes, acres lost and reason provided'});out.push({ok:!!f.livestock&&(f.livestock==='Yes'||!!f.livestockWhyNo),msg:'Livestock status documented; if No, explanation provided'});state.crops.forEach(c=>{out.push({ok:!!c.name&&!!c.acres,msg:`${c.name||'Crop'}: crop name and acres entered`});out.push({ok:c.cropPlanner.some(e=>e.crop&&e.plantingDate&&e.harvestDate),msg:`${c.name||'Crop'}: crop planner has at least one complete entry`});out.push({ok:String(c.noTill)==='true'||c.noTill===true||c.tillageRows.some(r=>r.tillageType),msg:`${c.name||'Crop'}: tillage is skipped by No Till or has events entered`});if(state.irrigationEnabled)c.irrigationRows.forEach(r=>{if(r.method==='Rain Fed Only')out.push({ok:!!r.drainageType,msg:`${c.name||'Crop'}: Rain Fed Only drainage type selected`})})});return out}
function reportText(){let lines=[];lines.push(`Farm Plan Report — ${state.farm.farmName||'Unnamed Farm'}`);lines.push(`Contact: ${state.farm.contactName||''} ${state.farm.email||''} ${state.farm.phone||''}`);lines.push(`Farm Address: ${state.farm.farmAddress||'Not entered'}`);lines.push(`Mailing Address: ${state.farm.mailingAddress||'Not entered'}`);lines.push(`Location: ${state.farm.county||''} ${state.farm.state||''} | USDA Zone: ${state.farm.usdaZone||''} | Frost Window: ${state.farm.lastFrost||''} to ${state.farm.firstFrost||''}`);lines.push(`NRCS Participation: ${state.farm.nrcs||'Not entered'} | Years Farming: ${state.farm.yearsFarming||'Not entered'} | Soil Lab Testing: ${state.farm.soilLabTesting||'Not entered'} | Soil Field Testing: ${state.farm.soilFieldTesting||'Not entered'}`);lines.push(`Field Boundaries Mapped and Confirmed: ${state.farm.fieldBoundariesConfirmed||'Not entered'} | Acres Added: ${state.farm.acresAdded||'Not entered'} | Acre Lost: ${state.farm.acresLost||'Not entered'} | Livestock: ${state.farm.livestock||'Not entered'}`);if(state.farm.fieldBoundariesConfirmed==='No')lines.push(`Field boundary explanation: ${state.farm.fieldBoundariesWhyNo||'Not entered'}`);if(state.farm.acresLost==='Yes')lines.push(`Acres lost: ${state.farm.acresLostAmount||'Not entered'} | Reason: ${state.farm.acresLostWhy||'Not entered'}`);if(state.farm.livestock==='No')lines.push(`Livestock explanation: ${state.farm.livestockWhyNo||'Not entered'}`);lines.push(`Farm Goals: ${state.farm.goals.join(', ')||'Not entered'}`);state.crops.forEach(c=>{let p=pillar(c);lines.push(`${c.name||'Crop'} (${c.cropType==='Other'?c.cropTypeOther:c.cropType||'crop type not entered'}): ${c.acres||0} acres; P1 ${p.P1}, P2 ${p.P2}, P5 Nutrients ${p.P5}, P5 IPM ${p.P5_IPM}, P7 ${p.P7}; gTIR ${fmt(p.TI)}; living root estimate ${p.rootPct}%.`)});lines.push('QA/QC: '+qaqc().filter(x=>!x.ok).length+' open item(s).');return lines.join('\n')}
function rowsNormalized(){let rows=[];let f=state.farm;state.crops.forEach(c=>{let p=pillar(c),base={farmName:f.farmName,contactName:f.contactName,email:f.email,phone:f.phone,farmAddress:f.farmAddress,mailingAddress:f.mailingAddress,state:f.state,county:f.county,usdaZone:f.usdaZone,firstFrost:f.firstFrost,lastFrost:f.lastFrost,nrcs:f.nrcs,yearsFarming:f.yearsFarming,totalAcres:f.totalAcres,acresAdded:f.acresAdded,acresLost:f.acresLost,acresLostAmount:f.acresLostAmount,acresLostWhy:f.acresLostWhy,soilLabTesting:f.soilLabTesting,soilFieldTesting:f.soilFieldTesting,fieldBoundariesConfirmed:f.fieldBoundariesConfirmed,fieldBoundariesWhyNo:f.fieldBoundariesWhyNo,livestock:f.livestock,livestockWhyNo:f.livestockWhyNo,cropName:c.name,cropType:c.cropType==='Other'?c.cropTypeOther:c.cropType,acres:c.acres,nonGmo:(String(c.nonGmo)==='true'||c.nonGmo===true)?'Yes':'No',P1:p.P1,P2:p.P2,P3:p.P3,P4:p.P4,P5:p.P5,P5_IPM:p.P5_IPM,P7:p.P7,tillageValue:p.TI,livingRootPct:p.rootPct};c.cropPlanner.forEach(r=>rows.push({...base,section:'crop_planner',...r}));c.harvestRows.forEach(r=>rows.push({...base,section:'harvest_log',...r,totalHarvest:num(c.acres)*num(r.yieldAcre)}));if(String(c.noTill)==='true'||c.noTill===true)rows.push({...base,section:'tillage_intensity',status:'No Till skipped',gTIR:0});else c.tillageRows.forEach(r=>rows.push({...base,section:'tillage_intensity',...r}));c.fertilizerRows.forEach(r=>rows.push({...base,section:'nutrient_management_plan',...r}));c.ipmRows.forEach(r=>rows.push({...base,section:'ipm_plan',...r}));if(state.dieselEnabled)c.dieselRows.forEach(r=>rows.push({...base,section:'diesel_log',...r,totalDiesel:dieselTotal(r)}));if(state.irrigationEnabled)c.irrigationRows.forEach(r=>rows.push({...base,section:'irrigation_log',...r,gallons:irrigGallons(r),acreFeet:irrigGallons(r)/325851}))});return rows}
function csv(rows){let heads=[...new Set(rows.flatMap(r=>Object.keys(r)))];return heads.join(',')+'\n'+rows.map(r=>heads.map(h=>'"'+String(r[h]??'').replace(/"/g,'""')+'"').join(',')).join('\n')}
function blobDownload(name,content,type='text/csv'){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}

function datasets(){let d={'00_farm_details.csv':csv([state.farm]),'99_normalized_dataset.csv':csv(rowsNormalized()),'farm_plan_report.txt':reportText()};d['01_crop_planner.csv']=csv(rowsNormalized().filter(r=>r.section==='crop_planner'));d['02_harvest_log.csv']=csv(rowsNormalized().filter(r=>r.section==='harvest_log'));d['03_tillage_intensity.csv']=csv(rowsNormalized().filter(r=>r.section==='tillage_intensity'));d['04_nutrient_management_plan.csv']=csv(rowsNormalized().filter(r=>r.section==='nutrient_management_plan'));d['05_ipm_plan.csv']=csv(rowsNormalized().filter(r=>r.section==='ipm_plan'));if(state.dieselEnabled)d['06_diesel_log.csv']=csv(rowsNormalized().filter(r=>r.section==='diesel_log'));if(state.irrigationEnabled)d['07_irrigation_log.csv']=csv(rowsNormalized().filter(r=>r.section==='irrigation_log'));return d}
function zipU16(n){return new Uint8Array([n&255,(n>>>8)&255])}
function zipU32(n){return new Uint8Array([n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255])}
function crc32Bytes(bytes){let c=~0;for(let i=0;i<bytes.length;i++){c^=bytes[i];for(let k=0;k<8;k++)c=c&1?0xedb88320^(c>>>1):c>>>1}return~c>>>0}
function dosDateTime(d=new Date()){let time=(d.getHours()<<11)|(d.getMinutes()<<5)|Math.floor(d.getSeconds()/2);let date=((d.getFullYear()-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate();return{time,date}}
function downloadZip(){
  saveInputs();
  const files=datasets();
  const enc=new TextEncoder();
  const localParts=[];
  const centralParts=[];
  let offset=0;
  const dt=dosDateTime();
  Object.keys(files).forEach(name=>{
    const nameBytes=enc.encode(name);
    const dataBytes=enc.encode(String(files[name]??''));
    const crc=crc32Bytes(dataBytes);
    const localHeader=[
      new Uint8Array([0x50,0x4b,0x03,0x04]), // local file header
      zipU16(20), zipU16(0x0800), zipU16(0), zipU16(dt.time), zipU16(dt.date),
      zipU32(crc), zipU32(dataBytes.length), zipU32(dataBytes.length),
      zipU16(nameBytes.length), zipU16(0), nameBytes
    ];
    localParts.push(...localHeader,dataBytes);
    const localSize=30+nameBytes.length+dataBytes.length;
    const centralHeader=[
      new Uint8Array([0x50,0x4b,0x01,0x02]), // central directory header
      zipU16(20), zipU16(20), zipU16(0x0800), zipU16(0), zipU16(dt.time), zipU16(dt.date),
      zipU32(crc), zipU32(dataBytes.length), zipU32(dataBytes.length),
      zipU16(nameBytes.length), zipU16(0), zipU16(0), zipU16(0), zipU16(0),
      zipU32(0), zipU32(offset), nameBytes
    ];
    centralParts.push(...centralHeader);
    offset+=localSize;
  });
  const centralSize=centralParts.reduce((s,p)=>s+p.length,0);
  const end=[
    new Uint8Array([0x50,0x4b,0x05,0x06]),
    zipU16(0), zipU16(0), zipU16(Object.keys(files).length), zipU16(Object.keys(files).length),
    zipU32(centralSize), zipU32(offset), zipU16(0)
  ];
  const blob=new Blob([...localParts,...centralParts,...end],{type:'application/zip'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='sci_farm_plan_complete_dataset_mac_compatible.zip';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
